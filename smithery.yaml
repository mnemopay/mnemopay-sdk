# Smithery configuration file: https://smithery.ai/docs/config#smitheryyaml
# MnemoPay: Give any AI agent memory and a wallet.

startCommand:
  type: stdio
  configSchema:
    # JSON Schema defining the configuration options for the MCP.
    type: object
    required: []
    properties:
      agentId:
        type: string
        default: "mcp-agent"
        description: Agent identifier. Each agent gets its own memory store and wallet.
      mode:
        type: string
        enum:
          - quick
          - production
        default: "quick"
        description: "quick = in-memory with local persistence, production = connects to Mnemosyne + AgentPay APIs."
      mnemoUrl:
        type: string
        description: Mnemosyne API URL (production mode only).
      agentpayUrl:
        type: string
        description: AgentPay API URL (production mode only).
      mnemoApiKey:
        type: string
        description: Mnemosyne API key (production mode only).
      agentpayApiKey:
        type: string
        description: AgentPay API key (production mode only).
      openaiApiKey:
        type: string
        description: OpenAI API key for semantic recall via embeddings (optional, enables vector search).
      recall:
        type: string
        enum:
          - score
          - vector
          - hybrid
        description: "Recall strategy: score (default), vector (semantic), or hybrid."
      persistDir:
        type: string
        description: Directory for file-based persistence in quick mode.
      debug:
        type: boolean
        default: false
        description: Enable debug logging.
  commandFunction:
    # A function that produces the CLI command to start the MCP on stdio.
    |-
    (config) => ({
      command: 'npx',
      args: ['-y', '@mnemopay/sdk'],
      env: {
        MNEMOPAY_AGENT_ID: config.agentId || 'mcp-agent',
        MNEMOPAY_MODE: config.mode || 'quick',
        ...(config.mnemoUrl ? { MNEMO_URL: config.mnemoUrl } : {}),
        ...(config.agentpayUrl ? { AGENTPAY_URL: config.agentpayUrl } : {}),
        ...(config.mnemoApiKey ? { MNEMO_API_KEY: config.mnemoApiKey } : {}),
        ...(config.agentpayApiKey ? { AGENTPAY_API_KEY: config.agentpayApiKey } : {}),
        ...(config.openaiApiKey ? { OPENAI_API_KEY: config.openaiApiKey } : {}),
        ...(config.recall ? { MNEMOPAY_RECALL: config.recall } : {}),
        ...(config.persistDir ? { MNEMOPAY_PERSIST_DIR: config.persistDir } : {}),
        ...(config.debug ? { DEBUG: 'true' } : {})
      }
    })
